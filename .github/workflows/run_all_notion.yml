name: run_all_notion

on:
  workflow_dispatch:
  schedule:
    # GitHub Actions cron uses UTC.
    # 08:30 KST = 23:30 UTC (previous day)
    # 17:30 KST = 08:30 UTC
    - cron: "30 23,8 * * *"

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
      NOTION_DB_ID: ${{ secrets.NOTION_DB_ID }}
      PUBLISH_GITHUB_TOKEN: ${{ secrets.PUBLISH_GITHUB_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false
          submodules: recursive

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Validate required secrets
        run: |
          test -n "$NOTION_TOKEN"
          test -n "$NOTION_DB_ID"
          test -n "$PUBLISH_GITHUB_TOKEN"

      - name: Configure git for cross-repo publish
        run: |
          git config --global user.name "run_all_notion bot"
          git config --global user.email "run-all-notion@users.noreply.github.com"
          git config --global url."https://x-access-token:${PUBLISH_GITHUB_TOKEN}@github.com/".insteadOf "https://github.com/"
          git config --local --unset-all http.https://github.com/.extraheader || true
          git submodule foreach --recursive 'git config --local --unset-all http.https://github.com/.extraheader || true'

      - name: Refresh dashboard repos to latest main
        run: |
          git submodule sync --recursive
          git submodule update --init --recursive
          git -C Bug_Dashboard fetch origin main
          git -C Bug_Dashboard checkout -B main origin/main
          git -C HQI fetch origin main
          git -C HQI checkout -B main origin/main

      - name: Run unified sync
        run: python3 run_all_notion.py
